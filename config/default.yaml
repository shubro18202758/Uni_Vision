# ─── Uni_Vision — Default Pipeline Configuration ───
# Values here are overridden by environment variables prefixed UV_.

hardware:
  device: "cuda"
  cuda_device_index: 0
  vram_ceiling_mb: 8192
  vram_safety_margin_mb: 256
  vram_poll_interval_ms: 500

vram_budgets:
  llm_weights_mb: 5000       # Region A — Gemma 4 E2B Q4_K_M GGUF weights (~7.2 GB disk, fits entirely on GPU)
  kv_cache_mb: 512            # Region B — 4096 token context KV cache
  vision_workspace_mb: 0      # Region C — Not needed (single multimodal model)
  system_overhead_mb: 512     # Region D — OS + CUDA driver context

pipeline:
  stream_queue_maxsize: 50
  inference_queue_maxsize: 10
  inference_queue_high_water: 8
  inference_queue_low_water: 3
  adaptive_throttle_factor: 0.5

preprocessing:
  straightener:
    enabled: true
    max_skew_degrees: 30.0
    skip_threshold_degrees: 3.0
  enhancer:
    resize:
      enabled: true
      min_height_px: 200
      interpolation: "INTER_CUBIC"
    clahe:
      enabled: true
      clip_limit: 2.0
      tile_grid_size: [8, 8]
    gaussian_blur:
      enabled: true
      kernel_size: [3, 3]
    bilateral_filter:
      enabled: true
      d: 9
      sigma_color: 75.0
      sigma_space: 75.0

ollama:
  base_url: "http://localhost:11434"
  model: "gemma4:e2b"              # Single multimodal model — Gemma 4 E2B (5.1B params, 2.3B effective, Text+Image+Audio, 128K ctx)
  timeout_s: 120
  num_ctx: 4096                    # Reduced from 128K for VRAM headroom on 8 GB GPU
  temperature: 1.0                 # Google-recommended default for Gemma 4
  top_p: 0.95                      # Google-recommended default for Gemma 4
  top_k: 64                        # Google-recommended default for Gemma 4
  repeat_penalty: 1.1
  repeat_last_n: 128
  num_predict: 1536
  num_batch: 256
  num_gpu: -1                      # offload all layers to GPU (Ollama auto-partial-offloads if needed)
  seed: 42
  stream: false
  max_retries: 2

circuit_breaker:
  failure_threshold: 3
  failure_window_s: 60
  recovery_timeout_s: 30

profiling:
  enabled: true
  device_index: 0
  history_size: 512
  validate_vram_budget_on_start: true

quantization:
  llm_format: "Q4_K_M"       # GGUF mixed 4-bit K-quants
  llm_model_tag: "gemma4:e2b"    # Gemma 4 E2B — single multimodal model

database:
  dsn: "postgresql://uni_vision:changeme@localhost:5432/uni_vision"
  pool_min: 2
  pool_max: 8

storage:
  endpoint: "http://localhost:9000"
  bucket: "uni-vision-images"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  region: "us-east-1"

redis:
  url: "redis://localhost:6379/0"

manager:
  enabled: true
  hub_cache_dir: "~/.cache/uni_vision/hub"
  vram_total_mb: 8192
  vram_reserved_for_llm_mb: 5500
  max_search_results: 10
  http_timeout_s: 30.0
  default_scene: "general"
  prefer_trusted: true
  auto_download: true
  max_concurrent_downloads: 2
  component_warmup: true

navarasa:
  enabled: false                   # Disabled — all tasks handled by Gemma 4 E2B
  model: "gemma4:e2b"              # Fallback model if anything reads this
  base_url: "http://localhost:11434"
  timeout_s: 15.0
  num_ctx: 4096
  temperature: 1.0
  top_p: 0.9
  top_k: 30
  num_predict: 512
  num_gpu: -1
  seed: 42
  max_retries: 2
  default_language: "hi"
  supported_languages: "hi,te,ta,kn,ml,mr,bn,gu,pa,or,ur,as,kok,ne,sd,en"
  translate_alerts: false

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1

logging:
  log_level: "INFO"
  log_format: "json"

visualizer_enabled: false

# ─── Databricks Add-on Integrations ───
# All Databricks components are optional add-ons.  Set enabled: true
# and install the [databricks] extra to activate.
databricks:
  enabled: false

  delta:
    table_path: "./data/delta/detections"
    audit_table_path: "./data/delta/audit_log"
    partition_columns: ["camera_id"]
    checkpoint_interval: 50
    vacuum_retain_hours: 168       # 7-day retention
    enable_time_travel: true
    max_versions: 500

  mlflow:
    tracking_uri: "./data/mlflow"
    experiment_name: "uni-vision-inference"
    log_every_n_frames: 50
    log_system_metrics: true
    register_models: true
    run_name_prefix: "uv-pipeline"

  spark:
    master: "local[*]"
    app_name: "UniVisionAnalytics"
    driver_memory: "2g"
    executor_memory: "1g"
    shuffle_partitions: 4
    delta_table_path: "./data/delta/detections"

  faiss:
    index_path: "./data/faiss/detection_index.bin"
    metadata_path: "./data/faiss/detection_metadata.json"
    embedding_model: "all-MiniLM-L6-v2"
    embedding_dim: 384
    nprobe: 10
    top_k: 20
    similarity_threshold: 0.65
    rebuild_interval_s: 3600.0
