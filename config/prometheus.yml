# Uni_Vision — Prometheus Scrape Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: "uni-vision"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "uni-vision"
          environment: "dev"
